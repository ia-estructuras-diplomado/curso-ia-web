# Sistema de calificación
grading:
  formula: "NF = 0.30*T1 + 0.30*T2 + 0.40*T3"
  breakdown:
    T1: 
      name: "Trabajo Grupal 1"
      percentage: 30
      date: "2026-06-09"
    T2: 
      name: "Trabajo Grupal 2"
      percentage: 30
      date: "2026-06-18"
    T3: 
      name: "Trabajo Grupal 3"
      percentage: 40
      date: "2026-06-23"

# Prerrequisitos y descripción
prerequisites: "Conocimientos básicos en programación y conceptos de ingeniería"
description: |
  Este diplomado ofrece una introducción integral a la Inteligencia Artificial aplicada 
  a la Ingeniería Civil. Cubriremos desde conceptos fundamentales de Machine Learning 
  hasta aplicaciones prácticas en monitoreo estructural y modelado digital.

# Objetivos de aprendizaje
learning_outcomes:
  - "Comprender conceptos fundamentales de IA, ML y Deep Learning"
  - "Aplicar técnicas de ML en problemas reales de ingeniería civil"
  - "Desarrollar habilidades en análisis de datos y Big Data"
  - "Diseñar y entrenar modelos predictivos para casos de uso estructurales"
  - "Comprender el futuro de Digital Twins y Smart Cities"
