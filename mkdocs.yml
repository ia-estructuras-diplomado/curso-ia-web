site_name: Curso IA Web
site_url: https://ia-estructuras-diplomado.github.io/curso-ia-web/
site_description: Documentación del curso de Inteligencia Artificial para la web
site_author: IA Estructuras Diplomado

theme:
  name: material
  language: es
  font:
    text: Outfit
    code: Fira Code
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate

plugins:
  - search:
      lang: es

markdown_extensions:
  - pymdownx.emoji
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.snippets:
      base_path: ['docs/_snippets']
  - toc:
      permalink: true

nav:
  - Curso:
      - Inicio: index.md
      - Cronograma: curso/cronograma.md
      - Contenido por sesión:
          - Sesión 1 - Introducción a IA: sesiones/sesion1.md
          - Sesión 2 - Datos y aprendizaje no supervisado: sesiones/sesion2.md
          - Sesión 3 - Aprendizaje supervisado: sesiones/sesion3.md
          - Sesión 4 - xAI y Trabajo Grupal 1: sesiones/sesion4.md
          - Sesión 5 - Deep Learning y señales: sesiones/sesion5.md
          - Sesión 6 - Gemelos digitales y Transformers: sesiones/sesion6.md
          - Sesiones 7 y 8 - Cierre del curso: sesiones/sesion7-8.md
      - Trabajos grupales:
          - Guía general: trabajos/guia.md
          - Trabajo Grupal 1: trabajos/trabajo1.md
          - Trabajo Grupal 2: trabajos/trabajo2.md
          - Trabajo Grupal 3: trabajos/trabajo3.md
      - Calificación: curso/calificacion.md
  - Labs:
      - Descripción general: labs/index.md
      - GitHub Codespaces: labs/codespaces.md
      - Lab 0 - Python para IA: labs/lab0.md
      - Lab 1 - PCA y SHM: labs/lab1.md
      - Lab 2 - Resistencia hormigón: labs/lab2.md
      - Lab 3 - xAI: labs/lab3.md
      - Lab 4 - CNN y RNN: labs/lab4.md
      - Lab 5 - LLM local / RAG: labs/lab5.md
      - Lab 6 - Agentes de IA: labs/lab6.md
  - Información:
      - Syllabus: curso/syllabus.md
      - FAQ: faq.md
      - Recursos:
          - Herramientas: recursos/herramientas.md
          - Librerías Python: recursos/librerias.md
          - Referencias: recursos/referencias.md

repo_url: https://github.com/ia-estructuras-diplomado/curso-ia-web
repo_name: GitHub

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ia-estructuras-diplomado
