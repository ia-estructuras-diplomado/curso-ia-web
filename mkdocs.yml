site_name: Curso IA Web
site_url: https://ia-estructuras-diplomado.github.io/curso-ia-web/
site_description: Documentación del curso de Inteligencia Artificial para la web
site_author: IA Estructuras Diplomado

theme:
  name: material
  language: es
  font:
    text: Outfit
    code: Fira Code
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate

plugins:
  - search:
      lang: es

markdown_extensions:
  - pymdownx.emoji
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.snippets:
      base_path: ['docs/_snippets']
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Información del Curso:
      - Syllabus: curso/syllabus.md
      - Cronograma: curso/cronograma.md
      - Calificación: curso/calificacion.md
  - Contenido Teórico:
      - Sesión 1 - Introducción a IA: sesiones/sesion1.md
      - Sesión 2 - Big Data: sesiones/sesion2.md
      - Sesión 3 - ML Modelos: sesiones/sesion3.md
      - Sesión 5 - Señales y Clústeres: sesiones/sesion5.md
      - Sesión 6 - Futuro e Innovación: sesiones/sesion6.md
  - Laboratorios & Prácticas:
      - Descripción General: labs/index.md
      - GitHub Codespaces: labs/codespaces.md
      - Lab 0 - Python para IA: labs/lab0.md
      - Lab 1 - PCA y SHM: labs/lab1.md
      - Lab 2 - Resistencia Hormigón: labs/lab2.md
      - Lab 3 - xAI: labs/lab3.md
      - Lab 4 - CNN y RNN: labs/lab4.md
      - Lab 5 - LLM Locales: labs/lab5.md
      - Lab 6 - Agentes de IA: labs/lab6.md
  - Trabajos Grupales:
      - Guía General: trabajos/guia.md
      - Trabajo Grupal 1: trabajos/trabajo1.md
      - Trabajo Grupal 2: trabajos/trabajo2.md
      - Trabajo Grupal 3: trabajos/trabajo3.md
  - Recursos:
      - Herramientas: recursos/herramientas.md
      - Librerías Python: recursos/librerias.md
      - Referencias y Lecturas: recursos/referencias.md
  - FAQ: faq.md

repo_url: https://github.com/ia-estructuras-diplomado/curso-ia-web
repo_name: GitHub

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ia-estructuras-diplomado
